# Setup requis (une seule fois) :
#
# 1. GitHub repo Settings -> Actions -> General :
#    - Workflow permissions : Read and write
#    - Allow GitHub Actions to create and approve pull requests
#
# 2. npmjs.com -> package "bcquality-mcp" -> Settings -> Publishing access
#    -> Add a trusted publisher -> GitHub Actions :
#      Organization or user : glachana
#      Repository           : bcquality-mcp
#      Workflow filename    : release.yml
#      Environment name     : (vide)
#
# Aucun NPM_TOKEN n'est nécessaire — l'auth se fait via OIDC.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release-please PR / GitHub release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm (Trusted Publisher OIDC requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: |
          npm test
          npm run test:e2e

      - name: Publish package (OIDC Trusted Publisher + provenance)
        run: npm publish --provenance --access public
